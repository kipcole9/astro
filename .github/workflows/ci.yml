name: Elixir CI

# Define workflow that runs when changes are pushed to the
# `main` branch or pushed to a PR branch that targets the `main`
# branch. Change the branch name if your project uses a
# different name for the main branch like "master" or "production".
on:
  push:
    branches: [ "main" ]  # adapt branch for project
  pull_request:
    branches: [ "main" ]  # adapt branch for project

# Sets the ENV `MIX_ENV` to `test` for running tests
env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test on OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    strategy:
      # A transient failure in one matrix entry (e.g. a network timeout
      # downloading the JPL ephemeris) should not cancel the other entries.
      fail-fast: false
      # Specify the OTP and Elixir versions to use when building
      # and running the workflow steps.
      matrix:
        include:
          # minimum required versions
          - otp: "27.2.4"
            elixir: "1.18.4-otp-27"
          - otp: "28.3.1"
            elixir: "1.18.4-otp-28"
          - otp: "27.2.4"
            elixir: "1.19.5-otp-27"
          - otp: "28.3.1"
            elixir: "1.19.5-otp-28"
          - otp: "28.3.1"
            elixir: "1.20.1-otp-28"
            lint: true
          - otp: "29.0.1"
            elixir: "1.20.1-otp-29"
            lint: true
    steps:
    # Step: Setup Elixir + Erlang image as the base.
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.otp}}
        elixir-version: ${{matrix.elixir}}

    # Step: Check out the code.
    - name: Checkout code
      uses: actions/checkout@v5

    # Step: Define how to cache deps. Restores existing cache if present.
    # Cache key includes OTP and Elixir versions so that matrix entries do not
    # share BEAMs compiled against a different toolchain (which can leave a
    # dependency like hackney with a stale/missing ebin).
    - name: Cache deps
      id: cache-deps
      uses: actions/cache@v5
      env:
        cache-name: cache-elixir-deps
      with:
        path: deps
        key: ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-mix-${{ env.cache-name }}-

    # Step: Define how to cache the `_build` directory. After the first run,
    # this speeds up tests runs a lot. This includes not re-compiling our
    # project's downloaded deps every run.
    - name: Cache compiled build
      id: cache-build
      uses: actions/cache@v5
      env:
        cache-name: cache-compiled-build
      with:
        path: _build
        key: ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-mix-${{ env.cache-name }}-

    # Step: Download project dependencies. If unchanged, uses
    # the cached version.
    - name: Install dependencies
      run: mix deps.get

    # Step: Compile the project treating any warnings as errors.
    - name: Compiles without warnings
      run: mix compile --warnings-as-errors

    - name: Install time zone data
      run: mix tz_world.update

    # Step: Cache the JPL DE440s ephemeris (~32 MB, static file). NAIF's
    # server is slow and occasionally times out, so cache it across runs and
    # only hit the network on a cache miss. The key is constant because the
    # file never changes; bump it if the ephemeris is ever replaced. The path
    # matches the runtime resolver's `:filename.basedir(:user_cache, "astro")`
    # location, so the tests find it without extra configuration.
    - name: Cache JPL ephemeris
      id: cache-ephemeris
      uses: actions/cache@v5
      with:
        path: ~/.cache/astro
        key: astro-ephemeris-de440s

    - name: Install ephemeris
      if: steps.cache-ephemeris.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/.cache/astro
        for i in 1 2 3; do
          if mix astro.download_ephemeris --dest ~/.cache/astro/de440s.bsp; then
            exit 0
          fi
          echo "Ephemeris download attempt $i failed; retrying in 15s..."
          sleep 15
        done
        echo "Ephemeris download failed after 3 attempts" >&2
        exit 1

    # Step: Check that the checked in code has already been formatted.
    # This step fails if something was found unformatted.
    # Customize this step as desired.
    # - name: Check Formatting
    #   run: mix format --check-formatted

    # Step: Execute the tests.
    - name: Run tests
      run: mix test

    # Step: Execute dialyzer.
    - name: Run dialyzer
      run: mix dialyzer
